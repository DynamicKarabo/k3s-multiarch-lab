# ── Base Kustomization ──
# Shared resources deployed to both local and prod environments.
# Environment-specific overrides go in overlays/.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - network-policy-deny.yaml
  - network-policy-dns.yaml

labels:
  - pairs:
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/part-of: k3s-multiarch-lab
