# ── Local overlay ──
# Local k3d cluster uses NodePort for service access.
# Resource limits are scaled down to fit dev machine.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: k3s-lab

patches:
  # Reduce resource requirements for local dev
  - target:
      kind: Deployment
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
