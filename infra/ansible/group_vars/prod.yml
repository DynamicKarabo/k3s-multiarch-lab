---
# ── Production environment (Hetzner + Oracle) ──

k3s_provision: true
tailscale_enabled: true

# Hetzner VPS — K3s server node
hetzner:
  host: 178.105.76.236
  user: root
  tailscale_ip: ""  # set after Tailscale auth
  role: server

# Oracle ARM — K3s agent node
oracle:
  host: ""  # set after provisioning
  user: ubuntu
  tailscale_ip: ""
  role: agent

# Tailscale auth key (set via environment or ansible-vault)
tailscale_auth_key: "{{ lookup('env', 'TAILSCALE_AUTH_KEY') | default('', true) }}"

# Ingress
ingress_type: Ingress
cloudflare_tunnel_enabled: false

# Sysctl tuning needed for real nodes
sysctl_tuning: true
