---
# ── Shared variables across all environments ──

k3s_version: v1.32.3+k3s1
k3s_release_channel: stable

# K3s install URL
k3s_install_url: "https://get.k3s.io"

# Tailscale
tailscale_version: latest

# CNI
flannel_iface: tailscale0

# Kubelet tuning for cross-DC latency
kubelet_node_status_update_frequency: 30s
kubelet_node_monitor_grace_period: 2m

# Directories
k3s_data_dir: /var/lib/rancher/k3s
k3s_config_dir: /etc/rancher/k3s

# Container runtime
containerd_version: latest
