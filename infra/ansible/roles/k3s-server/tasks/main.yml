---
# ── K3s Server (Control Plane + optional worker) ──

- name: Check if K3s is already installed
  command: which k3s
  register: k3s_installed
  changed_when: false
  failed_when: false

- name: Install K3s server
  shell: |
    curl -sfL {{ k3s_install_url }} | \
      INSTALL_K3S_VERSION={{ k3s_version }} \
      INSTALL_K3S_EXEC="server \
        --node-ip={{ tailscale_ip }} \
        --flannel-iface={{ flannel_iface }} \
        --kubelet-arg=node-status-update-frequency={{ kubelet_node_status_update_frequency }} \
        --kube-controller-manager-arg=node-monitor-grace-period={{ kubelet_node_monitor_grace_period }} \
        --disable=traefik \
        --write-kubeconfig-mode=644 \
        --cluster-cidr=10.42.0.0/16 \
        --service-cidr=10.43.0.0/16 \
        --disable-network-policy" \
      sh -
  args:
    warn: false
    creates: /usr/local/bin/k3s
  when: k3s_installed.rc != 0
  notify: wait for k3s ready

- name: Ensure k3s service is running
  systemd:
    name: k3s
    enabled: true
    state: started

- name: Wait for node to be ready
  command: k3s kubectl wait --for=condition=Ready node/{{ inventory_hostname }} --timeout=60s
  changed_when: false
  when: k3s_installed.rc != 0

- name: Read node-token for agents to join
  slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: node_token_file
  when: k3s_provision | default(false)

- name: Set node-token fact
  set_fact:
    k3s_token: "{{ node_token_file.content | b64decode | trim }}"
  when: k3s_provision | default(false)

- name: Display join command for agents
  debug:
    msg: >
      Agent join: curl -sfL {{ k3s_install_url }} |
      K3S_URL=https://{{ tailscale_ip }}:6443
      K3S_TOKEN={{ k3s_token }}
      sh -
  when: k3s_provision | default(false)

- name: Open UFW ports for K3s server
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - 6443   # Kubernetes API
    - 10250  # Kubelet
  when: sysctl_tuning | default(false)
