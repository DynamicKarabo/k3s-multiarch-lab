---
# ── Tailscale setup for cross-DC networking ──

- name: Check if Tailscale is already installed
  command: which tailscale
  register: tailscale_installed
  changed_when: false
  failed_when: false

- name: Check if Tailscale is already logged in
  command: tailscale status
  register: tailscale_status
  changed_when: false
  failed_when: false
  when: tailscale_installed.rc == 0

- name: Install Tailscale (official script)
  shell: |
    curl -fsSL https://tailscale.com/install.sh | sh
  args:
    creates: /usr/local/bin/tailscale
  when: tailscale_installed.rc != 0

- name: Authenticate and start Tailscale
  shell: |
    tailscale up \
      --authkey {{ tailscale_auth_key }} \
      --hostname {{ inventory_hostname }} \
      --accept-routes \
      --accept-dns=false
  when:
    - tailscale_auth_key | length > 0
    - tailscale_status is not defined or tailscale_status.failed

- name: Get Tailscale IP
  command: tailscale ip -4
  register: tailscale_ip_result
  changed_when: false
  when: tailscale_enabled | default(false)

- name: Set Tailscale IP fact
  set_fact:
    tailscale_ip: "{{ tailscale_ip_result.stdout }}"
  when: tailscale_enabled | default(false)

- name: Enable Tailscale to start on boot
  systemd:
    name: tailscaled
    enabled: true
    state: started
