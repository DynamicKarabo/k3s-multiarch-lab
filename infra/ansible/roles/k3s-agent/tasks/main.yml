---
# ── K3s Agent (Worker Node) ──

- name: Check if K3s is already installed
  command: which k3s
  register: k3s_installed
  changed_when: false
  failed_when: false

- name: Install K3s agent
  shell: |
    curl -sfL {{ k3s_install_url }} | \
      INSTALL_K3S_VERSION={{ k3s_version }} \
      K3S_URL=https://{{ hostvars['hetzner-vps']['tailscale_ip'] }}:6443 \
      K3S_TOKEN={{ k3s_token }} \
      INSTALL_K3S_EXEC="agent \
        --node-ip={{ tailscale_ip }} \
        --flannel-iface={{ flannel_iface }} \
        --kubelet-arg=node-status-update-frequency={{ kubelet_node_status_update_frequency }}" \
      sh -
  args:
    warn: false
    creates: /usr/local/bin/k3s
  when: k3s_installed.rc != 0

- name: Ensure k3s-agent service is running
  systemd:
    name: k3s-agent
    enabled: true
    state: started

- name: Open UFW ports for K3s agent
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - 10250  # Kubelet
  when: sysctl_tuning | default(false)
