---
# ── Production cluster inventory (Hetzner + Oracle) ──
all:
  children:
    k3s_server:
      hosts:
        hermes:
          ansible_host: 178.105.76.236
          ansible_user: root
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519
          node_role: server
          node_type: amd64
          tailscale_ip: 100.83.4.66
    k3s_agent:
      hosts:
        oracle-arm:
          ansible_host: ""  # set after OCI provisioning
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519
          node_role: agent
          node_type: arm64
          tailscale_ip: ""  # set after provisioning
  vars:
    env_type: prod
    k3s_provision: true
    tailscale_enabled: true
    sysctl_tuning: true
    hetzner:
      host: 178.105.76.236
      user: root
      tailscale_ip: 100.83.4.66
      role: server
    oracle:
      host: ""
      user: ubuntu
      tailscale_ip: ""
      role: agent
    tailscale_auth_key: "{{ lookup('env', 'TAILSCALE_AUTH_KEY') | default('', true) }}"
    ingress_type: Ingress
    cloudflare_tunnel_enabled: false
